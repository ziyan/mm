services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: mmpass
      POSTGRES_DB: mattermost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d mattermost"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  mattermost:
    image: mattermost/mattermost-enterprise-edition:release-10.6
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:mmpass@postgres:5432/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: http://localhost:8065
      MM_SERVICESETTINGS_LISTENADDRESS: ":8065"
      MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS: "true"
      MM_TEAMSETTINGS_ENABLEOPENSERVER: "true"
      MM_LOGSETTINGS_CONSOLELEVEL: ERROR
      MM_LOGSETTINGS_ENABLEFILE: "false"
    ports:
      - "${MM_PORT:-8065}:8065"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8065/api/v4/system/ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
