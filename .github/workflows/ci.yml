name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start Mattermost
        run: docker compose -f test/docker-compose.yml up -d --wait

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests
        env:
          MM_SERVER_URL: http://localhost:8065
        run: |
          mkdir -p coverage
          gotestsum --format testdox --junitfile coverage/junit.xml -- -mod=vendor -coverprofile=coverage/coverage.out -covermode=atomic -count=1 -timeout=5m ./...

      - name: Coverage report
        run: go tool cover -func=coverage/coverage.out

      - name: Stop Mattermost
        if: always()
        run: docker compose -f test/docker-compose.yml down -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags 2>/dev/null || echo 0.1.0)
          COMMIT=$(git describe --match=NeVeRmAtCh --always --abbrev=40 --dirty)
          LDFLAGS="-s -w -X github.com/ziyan/mm/internal/version.version=${VERSION} -X github.com/ziyan/mm/internal/version.commit=${COMMIT}"
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -mod=vendor -ldflags "${LDFLAGS}" -o mm-${{ matrix.goos }}-${{ matrix.goarch }}${ext} ./command/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mm-*
